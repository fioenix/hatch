name: hatch CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum
      - name: Verify modules tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Lint (vet + gofmt)
        run: make lint
      - name: Test
        run: make test
      - name: Build
        run: make build
